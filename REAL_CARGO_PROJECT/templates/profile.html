{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h3>My Profile</h3>
            <hr>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="full_name" class="form-control" value="{{ current_user.full_name }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" value="{{ current_user.email }}" disabled>
                    <small class="text-muted">Email cannot be changed.</small>
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" name="phone" class="form-control" value="{{ current_user.phone }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Home Address</label>
                    <input type="text" name="address" class="form-control" value="{{ current_user.address or '' }}">
                </div>
                
                {% if current_user.role == 'driver' %}
                <div class="mb-3">
                    <label class="form-label">Vehicle Type</label>
                    <input type="text" class="form-control" value="{{ current_user.vehicle_type | capitalize }}" disabled>
                </div>
                <div class="mb-3">
                    <label class="form-label">Vehicle ID</label>
                    <input type="text" class="form-control" value="{{ current_user.vehicle_id }}" disabled>
                </div>
                {% endif %}
                
                <button type="submit" class="btn btn-primary w-100 mt-3">Update Profile</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
