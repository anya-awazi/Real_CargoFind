{% extends "base.html" %}

{% block content %}
<div class="row g-4 animate-up">
    <div class="col-lg-5">
        <div class="card p-4 border-0 shadow-sm">
            <h3 class="fw-bold mb-4">Book a Delivery</h3>
            <form id="bookingForm" method="POST">
                <div class="mb-3 position-relative">
                    <label class="form-label small text-uppercase fw-bold text-muted">Pickup Location</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="fas fa-map-marker-alt text-success"></i></span>
                        <input type="text" id="pickup_input" name="pickup_location" class="form-control floating-input border-start-0 ps-0" placeholder="Where should we pick up?" required autocomplete="off">
                    </div>
                    <div id="pickup_results" class="list-group position-absolute w-100 z-3 shadow-lg"></div>
                    <input type="hidden" id="pickup_lat" name="pickup_lat">
                    <input type="hidden" id="pickup_lng" name="pickup_lng">
                </div>
                
                <div class="mb-4 position-relative">
                    <label class="form-label small text-uppercase fw-bold text-muted">Drop-off Location</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="fas fa-flag-checkered text-danger"></i></span>
                        <input type="text" id="dropoff_input" name="dropoff_location" class="form-control floating-input border-start-0 ps-0" placeholder="Where is it going?" required autocomplete="off">
                    </div>
                    <div id="dropoff_results" class="list-group position-absolute w-100 z-3 shadow-lg"></div>
                    <input type="hidden" id="dropoff_lat" name="dropoff_lat">
                    <input type="hidden" id="dropoff_lng" name="dropoff_lng">
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-12">
                        <label class="form-label small text-uppercase fw-bold text-muted">Pickup Date</label>
                        <input type="date" name="pickup_date" class="form-control floating-input" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small text-uppercase fw-bold text-muted">Pickup Time</label>
                        <input type="time" name="pickup_time" class="form-control floating-input" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small text-uppercase fw-bold text-muted">Expected Drop-off Time</label>
                        <input type="time" name="dropoff_time" class="form-control floating-input">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label small text-uppercase fw-bold text-muted">Goods Description</label>
                    <textarea name="goods_description" class="form-control floating-input" rows="2" placeholder="What are you sending?" required></textarea>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label small text-uppercase fw-bold text-muted">Weight (kg)</label>
                        <input type="number" name="weight" id="weight" class="form-control floating-input" step="0.1" placeholder="0.0">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small text-uppercase fw-bold text-muted">Vehicle Type</label>
                        <select name="vehicle_type" id="vehicle_type" class="form-select floating-input">
                            <option value="car" selected>Car (250 XAF/km)</option>
                            <option value="van">Van (350 XAF/km)</option>
                            <option value="truck">Truck (500 XAF/km)</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small text-uppercase fw-bold text-muted d-block mb-3">Service Options</label>
                    <div class="d-flex flex-column gap-2">
                        <div class="form-check custom-option p-3 border rounded-3 d-flex align-items-center">
                            <input class="form-check-input cost-trigger ms-0 me-3" type="checkbox" name="heavy_goods" id="heavy_goods">
                            <label class="form-check-label flex-grow-1" for="heavy_goods">
                                <span class="d-block fw-bold">Heavy Goods</span>
                                <small class="text-muted">+1,000 XAF</small>
                            </label>
                        </div>
                        <div class="form-check custom-option p-3 border rounded-3 d-flex align-items-center">
                            <input class="form-check-input cost-trigger ms-0 me-3" type="checkbox" name="fragile_goods" id="fragile_goods">
                            <label class="form-check-label flex-grow-1" for="fragile_goods">
                                <span class="d-block fw-bold">Fragile Handling</span>
                                <small class="text-muted">+500 XAF</small>
                            </label>
                        </div>
                        <div class="form-check custom-option p-3 border rounded-3 d-flex align-items-center">
                            <input class="form-check-input cost-trigger ms-0 me-3" type="checkbox" name="urgent_delivery" id="urgent_delivery">
                            <label class="form-check-label flex-grow-1" for="urgent_delivery">
                                <span class="d-block fw-bold">Urgent Delivery</span>
                                <small class="text-muted">+1,000 XAF</small>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="card bg-primary-subtle border-0 p-4 mb-4 rounded-4">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="text-primary fw-bold">Distance:</span>
                        <div class="text-end">
                            <span id="distance_text" class="fw-bold h5 mb-0 d-block">0 km</span>
                            <small class="text-muted" style="font-size: 0.65rem;">(Min. 1 km charge applies)</small>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center pt-2 border-top border-primary border-opacity-25">
                        <span class="text-primary fw-bold">Total Cost:</span>
                        <span id="total_cost_text" class="h4 fw-bold text-primary mb-0">500 XAF</span>
                    </div>
                    <input type="hidden" name="distance_km" id="distance_km" value="0">
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-lg rounded-pill py-3 fw-bold shadow">
                    Confirm Booking
                </button>
            </form>
        </div>
    </div>
    <div class="col-lg-7">
        <div class="sticky-top" style="top: 100px;">
            <div id="map" style="height: 650px;"></div>
            <div class="card mt-3 border-0 shadow-sm p-3">
                <div class="d-flex align-items-center text-muted small">
                    <i class="fas fa-info-circle me-2"></i>
                    Select locations on the map or use the search box to calculate route and price.
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .custom-option { cursor: pointer; transition: all 0.2s ease; }
    .custom-option:hover { background-color: #f8f9fa; border-color: var(--primary-color) !important; }
    .form-check-input:checked + .form-check-label .fw-bold { color: var(--primary-color); }
</style>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

<script>
    let map = L.map('map').setView([4.0511, 9.7679], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const greenIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
    });

    const redIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
    });

    let routingControl;
    let distanceKm = 0;

    function updatePrice() {
        const vehicleType = document.getElementById('vehicle_type').value;
        const heavy = document.getElementById('heavy_goods').checked;
        const fragile = document.getElementById('fragile_goods').checked;
        const urgent = document.getElementById('urgent_delivery').checked;

        fetch('/api/calculate_price', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                distance: distanceKm,
                vehicle_type: vehicleType,
                heavy: heavy,
                fragile: fragile,
                urgent: urgent
            })
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById('total_cost_text').innerText = data.total_cost + ' XAF';
        });
    }

    function searchLocation(query, resultsId, latId, lngId, inputId) {
        if (query.length < 3) return;
        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&countrycodes=cm`)
            .then(res => res.json())
            .then(data => {
                const results = document.getElementById(resultsId);
                results.innerHTML = '';
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'list-group-item list-group-item-action small py-2';
                    div.innerText = item.display_name;
                    div.onclick = () => {
                        document.getElementById(inputId).value = item.display_name;
                        document.getElementById(latId).value = item.lat;
                        document.getElementById(lngId).value = item.lon;
                        results.innerHTML = '';
                        updateRoute();
                    };
                    results.appendChild(div);
                });
            });
    }

    document.getElementById('pickup_input').oninput = (e) => searchLocation(e.target.value, 'pickup_results', 'pickup_lat', 'pickup_lng', 'pickup_input');
    document.getElementById('dropoff_input').oninput = (e) => searchLocation(e.target.value, 'dropoff_results', 'dropoff_lat', 'dropoff_lng', 'dropoff_input');

    document.getElementById('vehicle_type').onchange = updatePrice;
    document.querySelectorAll('.cost-trigger').forEach(el => el.onchange = updatePrice);

    function updateRoute() {
        const pLat = document.getElementById('pickup_lat').value;
        const pLng = document.getElementById('pickup_lng').value;
        const dLat = document.getElementById('dropoff_lat').value;
        const dLng = document.getElementById('dropoff_lng').value;

        if (routingControl) map.removeControl(routingControl);

        if (pLat && pLng && dLat && dLng) {
            routingControl = L.Routing.control({
                waypoints: [
                    L.latLng(pLat, pLng),
                    L.latLng(dLat, dLng)
                ],
                createMarker: function(i, wp) {
                    return L.marker(wp.latLng, {
                        icon: i === 0 ? greenIcon : redIcon
                    });
                },
                lineOptions: {
                    styles: [{ color: '#0d6efd', weight: 6, opacity: 0.8 }]
                },
                routeWhileDragging: false,
                addWaypoints: false,
                show: false
            }).addTo(map);

            routingControl.on('routesfound', function(e) {
                const routes = e.routes;
                const summary = routes[0].summary;
                distanceKm = (summary.totalDistance / 1000).toFixed(2);
                document.getElementById('distance_text').innerText = distanceKm + ' km';
                document.getElementById('distance_km').value = distanceKm;
                
                // Fit map to route
                const bounds = L.latLngBounds([L.latLng(pLat, pLng), L.latLng(dLat, dLng)]);
                map.fitBounds(bounds, {padding: [50, 50]});
                
                updatePrice();
            });
        }
    }
</script>
{% endblock %}
