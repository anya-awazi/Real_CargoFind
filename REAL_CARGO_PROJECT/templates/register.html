{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-7 col-lg-6">
        <div class="card border-0 shadow-lg p-4 p-md-5 rounded-4">
            <div class="text-center mb-5">
                <div class="bg-primary-subtle d-inline-block p-3 rounded-circle mb-3">
                    <i class="fas fa-user-plus fa-2x text-primary"></i>
                </div>
                <h2 class="fw-bold">Create Account</h2>
                <p class="text-muted">Join the fastest logistics network in Cameroon</p>
            </div>
            
            <form method="POST">
                <div class="row g-3 mb-4">
                    <div class="col-md-12">
                        <label class="form-label small text-uppercase fw-bold text-muted">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="far fa-user text-muted"></i></span>
                            <input type="text" name="full_name" class="form-control floating-input border-start-0 ps-0" placeholder="John Doe" required>
                        </div>
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label small text-uppercase fw-bold text-muted">Email Address</label>
                        <input type="email" name="email" class="form-control floating-input" placeholder="john@example.com" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small text-uppercase fw-bold text-muted">Phone Number</label>
                        <input type="tel" name="phone" class="form-control floating-input" placeholder="677000000" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small text-uppercase fw-bold text-muted">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="fas fa-key text-muted"></i></span>
                        <input type="password" name="password" class="form-control floating-input border-start-0 ps-0" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small text-uppercase fw-bold text-muted">Account Type</label>
                    <div class="row g-3">
                        <div class="col-6">
                            <input type="radio" class="btn-check" name="role" id="role_customer" value="customer" checked onchange="toggleDriverFields()">
                            <label class="btn btn-outline-primary w-100 py-3 rounded-4 fw-bold d-flex flex-column align-items-center gap-2" for="role_customer">
                                <i class="fas fa-shopping-bag fa-lg"></i>
                                Customer
                            </label>
                        </div>
                        <div class="col-6">
                            <input type="radio" class="btn-check" name="role" id="role_driver" value="driver" onchange="toggleDriverFields()">
                            <label class="btn btn-outline-primary w-100 py-3 rounded-4 fw-bold d-flex flex-column align-items-center gap-2" for="role_driver">
                                <i class="fas fa-truck-moving fa-lg"></i>
                                Driver
                            </label>
                        </div>
                    </div>
                </div>
                
                <div id="driverFields" style="display: none;" class="bg-light p-4 rounded-4 mb-4 border border-dashed border-primary border-opacity-25 animate__animated animate__fadeIn">
                    <h6 class="fw-bold mb-3 text-primary"><i class="fas fa-id-card me-2"></i>Professional Driver Details</h6>
                    <div class="mb-3">
                        <label class="form-label small text-uppercase fw-bold text-muted">Vehicle Type</label>
                        <select name="vehicle_type" class="form-select floating-input">
                            <option value="bike">Bike (Up to 20kg)</option>
                            <option value="car">Car (Up to 250kg)</option>
                            <option value="van">Van (Up to 1000kg)</option>
                            <option value="truck">Truck (Over 1000kg)</option>
                        </select>
                    </div>
                    <div class="mb-0">
                        <label class="form-label small text-uppercase fw-bold text-muted">Vehicle ID / Plate Number</label>
                        <input type="text" name="vehicle_id" class="form-control floating-input" placeholder="e.g. NW 123 AA">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold shadow-sm mb-4">
                    Create My Account
                </button>
            </form>
            
            <div class="text-center">
                <p class="text-muted small mb-0">Already have an account? <a href="{{ url_for('login') }}" class="fw-bold text-decoration-none">Sign In instead</a></p>
            </div>
        </div>
    </div>
</div>

<script>
function toggleDriverFields() {
    const isDriver = document.getElementById('role_driver').checked;
    const driverFields = document.getElementById('driverFields');
    driverFields.style.display = isDriver ? 'block' : 'none';
}
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
{% endblock %}
