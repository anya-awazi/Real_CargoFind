{% extends "base.html" %}

{% block content %}
<style>
    .email-container {
        max-width: 800px;
        margin: 2rem auto;
    }
    
    .email-card {
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        border: none;
        overflow: hidden;
    }
    
    .card-header-custom {
        background: linear-gradient(135deg, #0d6efd 0%, #0043a8 100%);
        padding: 2rem;
        color: white;
    }
    
    .card-header-custom h2 {
        font-weight: 700;
        margin: 0;
        font-size: 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }
    
    .card-body-custom {
        padding: 2.5rem;
    }
    
    .form-label {
        font-weight: 600;
        color: #495057;
        margin-bottom: 0.5rem;
    }
    
    .form-control, .form-select {
        border-radius: 12px;
        padding: 0.75rem 1rem;
        border: 2px solid #f1f3f5;
        background: #f8f9fa;
        transition: all 0.3s ease;
    }
    
    .form-control:focus, .form-select:focus {
        border-color: #0d6efd;
        background: white;
        box-shadow: 0 5px 15px rgba(13, 110, 253, 0.05);
    }
    
    .btn-send {
        padding: 0.875rem 2.5rem;
        border-radius: 12px;
        font-weight: 700;
        transition: all 0.3s ease;
    }
    
    .recipient-tag {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        background: #e9ecef;
        border-radius: 50px;
        font-size: 0.875rem;
        font-weight: 600;
        color: #495057;
        margin-bottom: 1rem;
    }
</style>

<div class="email-container">
    <div class="email-card">
        <div class="card-header-custom">
            <h2><i class="fas fa-paper-plane"></i> Broadcast Message</h2>
        </div>
        <div class="card-body-custom">
            <form method="POST">
                <div class="mb-4">
                    <label class="form-label">Send To</label>
                    <select name="recipient_type" class="form-select" required>
                        <option value="all">All Registered Users</option>
                        <option value="customer">All Customers Only</option>
                        <option value="driver">All Drivers Only</option>
                    </select>
                    <div class="mt-2 text-muted small">
                        <i class="fas fa-info-circle me-1"></i> This will send an individual email to each user in the selected group.
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Subject</label>
                    <input type="text" name="subject" class="form-control" placeholder="Enter message subject" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Message Content</label>
                    <textarea name="message" class="form-control" rows="8" placeholder="Type your message here..." required></textarea>
                </div>
                
                <div class="d-flex justify-content-between align-items-center">
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-link text-muted text-decoration-none fw-600">
                        <i class="fas fa-arrow-left me-2"></i> Cancel
                    </a>
                    <button type="submit" class="btn btn-primary btn-send shadow">
                        Send Message <i class="fas fa-paper-plane ms-2"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
