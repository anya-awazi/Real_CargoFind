{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center py-5 animate-up">
    <div class="col-md-5">
        <div class="card border-0 shadow-lg p-4 p-md-5 rounded-4">
            <div class="text-center mb-5">
                <div class="bg-warning-subtle d-inline-block p-3 rounded-circle mb-3">
                    <i class="fas fa-key fa-2x text-warning"></i>
                </div>
                <h2 class="fw-bold">Forgot Password?</h2>
                <p class="text-muted">Enter your email address and we'll send you a link to reset your password.</p>
            </div>
            
            <form method="POST">
                <div class="mb-4">
                    <label class="form-label small text-uppercase fw-bold text-muted">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="far fa-envelope text-muted"></i></span>
                        <input type="email" name="email" class="form-control floating-input border-start-0 ps-0" placeholder="name@example.com" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-warning w-100 py-3 rounded-pill fw-bold shadow-sm mb-4">
                    <i class="fas fa-paper-plane me-2"></i> Send Reset Link
                </button>
            </form>
            
            <div class="text-center">
                <p class="text-muted small mb-0">Remember your password? <a href="{{ url_for('login') }}" class="fw-bold text-decoration-none">Back to Login</a></p>
            </div>
        </div>
        
        <div class="text-center mt-4">
            <p class="small text-muted">&copy; 2026 CargoFind Cameroon. Secure Logistics Platform.</p>
        </div>
    </div>
</div>
{% endblock %}
