{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center py-5 animate-up">
    <div class="col-md-5">
        <div class="card border-0 shadow-lg p-4 p-md-5 rounded-4">
            <div class="text-center mb-5">
                <div class="bg-success-subtle d-inline-block p-3 rounded-circle mb-3">
                    <i class="fas fa-lock fa-2x text-success"></i>
                </div>
                <h2 class="fw-bold">Reset Password</h2>
                <p class="text-muted">Enter your new password below.</p>
            </div>
            
            <form method="POST">
                <div class="mb-4">
                    <label class="form-label small text-uppercase fw-bold text-muted">New Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="fas fa-key text-muted"></i></span>
                        <input type="password" name="password" class="form-control floating-input border-start-0 ps-0" placeholder="••••••••" required minlength="6">
                    </div>
                    <small class="text-muted">Minimum 6 characters</small>
                </div>
                
                <div class="mb-4">
                    <label class="form-label small text-uppercase fw-bold text-muted">Confirm New Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="fas fa-key text-muted"></i></span>
                        <input type="password" name="confirm_password" class="form-control floating-input border-start-0 ps-0" placeholder="••••••••" required minlength="6">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-success w-100 py-3 rounded-pill fw-bold shadow-sm mb-4">
                    <i class="fas fa-check me-2"></i> Reset Password
                </button>
            </form>
            
            <div class="text-center">
                <p class="text-muted small mb-0">Remember your password? <a href="{{ url_for('login') }}" class="fw-bold text-decoration-none">Back to Login</a></p>
            </div>
        </div>
        
        <div class="text-center mt-4">
            <p class="small text-muted">&copy; 2026 CargoFind Cameroon. Secure Logistics Platform.</p>
        </div>
    </div>
</div>
{% endblock %}
